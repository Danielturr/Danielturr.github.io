<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Copilot Agent Demo</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --accent-color: #238636;
            --accent-hover: #2ea043;
            --user-msg-bg: #1f6feb;
            --copilot-msg-bg: #21262d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        #chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 1.1em;
        }

        #chat-header svg {
            margin-right: 10px;
            fill: var(--text-color);
        }

        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        .copilot-message {
            align-self: flex-start;
            background-color: var(--copilot-msg-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }

        pre {
            background-color: #0d1117;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            margin: 10px 0 0 0;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.9em;
        }
        
        /* Inline code block styling */
        p code, .message > code {
            background-color: rgba(110, 118, 129, 0.4);
            padding: 0.2em 0.4em;
            border-radius: 6px;
        }

        #input-container {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #user-input {
            flex-grow: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 15px;
            resize: none;
            min-height: 24px;
            max-height: 150px;
            font-family: inherit;
        }

        #user-input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        #send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            height: 46px;
        }

        #send-btn:hover {
            background-color: var(--accent-hover);
        }

        .spark {
            position: fixed;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            animation: spark-fly 0.7s ease-out forwards;
        }

        @keyframes spark-fly {
            0%   { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">
            <!-- Copilot Logo SVG -->
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M9.875 6.5a4.625 4.625 0 0 1 8.62-2.126.75.75 0 0 0 1.306-.748A6.125 6.125 0 0 0 8.5 6.072v.928H5.75A1.75 1.75 0 0 0 4 8.75v3.5c0 .966.784 1.75 1.75 1.75h1.5v1.25A4.75 4.75 0 0 0 12 20h.5a.75.75 0 0 0 0-1.5h-.5a3.25 3.25 0 0 1-3.25-3.25v-1.25h9.5A1.75 1.75 0 0 0 20 12.25v-3.5A1.75 1.75 0 0 0 18.25 7H10V6.5Z"></path>
            </svg>
            GitHub Copilot Agent
        </div>
        <div id="chat-box">
            <div class="message copilot-message">
                <strong>Copilot:</strong><br>
                Hello! I am your web-based Copilot Agent. How can I assist you with your code today? Try asking me to <code>refactor</code> something, <code>explain</code> a concept, or use <code>@workspace</code>.
            </div>
        </div>
        <div id="input-container">
            <textarea id="user-input" placeholder="Ask Copilot... (Press Enter to send)" rows="1"></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
