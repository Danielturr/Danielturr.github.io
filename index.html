<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Copilot Agent Demo</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --accent-color: #238636;
            --accent-hover: #2ea043;
            --user-msg-bg: #1f6feb;
            --copilot-msg-bg: #21262d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        #chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 1.1em;
        }

        #chat-header svg {
            margin-right: 10px;
            fill: var(--text-color);
        }

        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        .copilot-message {
            align-self: flex-start;
            background-color: var(--copilot-msg-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }

        pre {
            background-color: #0d1117;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            margin: 10px 0 0 0;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.9em;
        }
        
        /* Inline code block styling */
        p code, .message > code {
            background-color: rgba(110, 118, 129, 0.4);
            padding: 0.2em 0.4em;
            border-radius: 6px;
        }

        #input-container {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #user-input {
            flex-grow: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 15px;
            resize: none;
            min-height: 24px;
            max-height: 150px;
            font-family: inherit;
        }

        #user-input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        #send-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            height: 46px;
        }

        #send-btn:hover {
            background-color: var(--accent-hover);
        }

        /* ── Home page ─────────────────────────────────────────── */
        #home-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        #home-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 1.1em;
        }

        #home-header svg {
            margin-right: 10px;
            fill: var(--text-color);
        }

        #new-chat-btn {
            margin-left: auto;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #new-chat-btn:hover {
            background-color: var(--accent-hover);
        }

        #history-section {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #history-section h2 {
            margin: 0 0 10px 0;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8b949e;
        }

        .history-item {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item:hover {
            border-color: #58a6ff;
            background-color: #161b22;
        }

        .history-item-title {
            font-weight: 600;
            font-size: 0.95em;
            color: #58a6ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-preview {
            font-size: 0.85em;
            color: #8b949e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-meta {
            font-size: 0.78em;
            color: #6e7681;
            margin-top: 2px;
        }

        /* ── Chat header back button ───────────────────────────── */
        #back-btn {
            background: none;
            border: none;
            color: #58a6ff;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            padding: 0 12px 0 0;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        #back-btn:hover {
            color: #79c0ff;
        }

        #chat-container {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Home page -->
    <div id="home-container">
        <div id="home-header">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M9.875 6.5a4.625 4.625 0 0 1 8.62-2.126.75.75 0 0 0 1.306-.748A6.125 6.125 0 0 0 8.5 6.072v.928H5.75A1.75 1.75 0 0 0 4 8.75v3.5c0 .966.784 1.75 1.75 1.75h1.5v1.25A4.75 4.75 0 0 0 12 20h.5a.75.75 0 0 0 0-1.5h-.5a3.25 3.25 0 0 1-3.25-3.25v-1.25h9.5A1.75 1.75 0 0 0 20 12.25v-3.5A1.75 1.75 0 0 0 18.25 7H10V6.5Z"></path>
            </svg>
            GitHub Copilot Agent
            <button id="new-chat-btn">+ New Chat</button>
        </div>
        <div id="history-section">
            <h2>Recent Chats</h2>
            <!-- Populated by app.js -->
        </div>
    </div>

    <!-- Chat page -->
    <div id="chat-container">
        <div id="chat-header">
            <button id="back-btn">&#8592; Back</button>
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M9.875 6.5a4.625 4.625 0 0 1 8.62-2.126.75.75 0 0 0 1.306-.748A6.125 6.125 0 0 0 8.5 6.072v.928H5.75A1.75 1.75 0 0 0 4 8.75v3.5c0 .966.784 1.75 1.75 1.75h1.5v1.25A4.75 4.75 0 0 0 12 20h.5a.75.75 0 0 0 0-1.5h-.5a3.25 3.25 0 0 1-3.25-3.25v-1.25h9.5A1.75 1.75 0 0 0 20 12.25v-3.5A1.75 1.75 0 0 0 18.25 7H10V6.5Z"></path>
            </svg>
            GitHub Copilot Agent
        </div>
        <div id="chat-box"></div>
        <div id="input-container">
            <textarea id="user-input" placeholder="Ask Copilot... (Press Enter to send)" rows="1"></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
